<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمد & إيمان</title>
    <style>
        :root { --primary: #ff4d6d; --bg: #fff0f3; }
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle, #ffccd5 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; color: #4a0e17;
        }
        h1 { color: var(--primary); margin-top: 20px; }
        .card { background: white; padding: 20px; margin: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .collapsible { background: var(--primary); color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; }
        .content { padding: 0 15px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: #fffafb; }
        .couple-img { width: 100%; max-width: 300px; border-radius: 20px; border: 3px solid var(--primary); }
    </style>
</head>
<body>

    <h1>محمد & إيمان</h1>
    <h2>بنت محمد❤️</h2>

    <div class="card">
        <h3>بداية حكايتنا ⏳</h3>
        <p id="timer"></p>
    </div>

    <div class="card">
        <button class="collapsible" onclick="toggleMsg()">اضغطي هنا لفتح رسالتي ليكي ✉️</button>
        <div class="content" id="msgContent">
            <p style="padding: 15px;">عارف اني زعلتك كتير حقك عليا يا بنت محمد بس مليش غيرك والله مهما حصل بينا من خناق او مشاكل ملناش غير بعض كبرنا مع بعض و بنعدي الدنيا مع بعض ❤️ حقك عليا يا بنت محمد ❤️ بحبك يا ملاكي ❤️</p>
        </div>
    </div>

    <div class="card">
        <img src="IMG-20260304-WA0007.jpeg" alt="صورة لينا" class="couple-img">
    </div>

    <script>
        function toggleMsg() {
            var content = document.getElementById("msgContent");
            content.style.maxHeight = content.style.maxHeight ? null : content.scrollHeight + "px";
        }

        function updateTimer() {
            const start = new Date("2022-10-29T00:00:00");
            const now = new Date();
            const diff = now - start;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("timer").innerText = days + " يوم من الحب والذكريات❤️";
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
